customHeaders:
  - pattern: '*.mp4'
    headers:
      - key: 'Content-Type'
        value: 'video/mp4'
      - key: 'Accept-Ranges'
        value: 'bytes'
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
  - pattern: '*.mp3'
    headers:
      - key: 'Content-Type'
        value: 'audio/mpeg'
      - key: 'Accept-Ranges'
        value: 'bytes'
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
